name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Install dependencies
        run: npm ci

      - name: Sync version from npm registry
        run: |
          PUBLISHED=$(npm view @caixiaoshun/claudex version 2>/dev/null || echo "")
          LOCAL=$(node -p "require('./package.json').version")
          echo "Published version : ${PUBLISHED:-none}"
          echo "Local version     : $LOCAL"
          if [ -n "$PUBLISHED" ] && [ "$PUBLISHED" != "$LOCAL" ]; then
            echo "Local package.json is out of sync — updating to $PUBLISHED before bump"
            npm version "$PUBLISHED" --no-git-tag-version --allow-same-version
          fi

      - name: Bump version
        run: |
          NEW_VERSION=$(npm version ${{ inputs.version }} --no-git-tag-version)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Bumped to $NEW_VERSION"

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit and push version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release ${{ env.NEW_VERSION }}"
          git tag "${{ env.NEW_VERSION }}"
          git push
          git push --tags
